spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# MySQL Configuration
spring.datasource.url=jdbc:mysql://3.110.159.86:3306/digital_ca_main?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
